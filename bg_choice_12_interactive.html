<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlueMoonBio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
/* 0. GLOBAL STYLE */
:root {
  --bg: #05070c;
  --accent: #00BFFF;
  --surface: #0d1117;
  --border: #30363d;
  --text-primary: #E6EDF3;
  --text-muted: #9BA3AF;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background-color: var(--bg);
  background-attachment: fixed;
  color: var(--text-primary);
  line-height: 1.6;
}
canvas { position: fixed; top: 0; left: 0; z-index: -1; }
.container {
  width: 85%;
  max-width: 950px;
  margin: 0 auto;
  padding: 60px 0;
}
section {
  padding: 80px 0;
}
h2 {
  font-size: 32px;
  text-align: center;
  margin-bottom: 50px;
}
.muted { color: var(--text-muted); }

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 0 60px 0;
}
.logo {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -1px;
  font-family: 'Inter', sans-serif;
}

.header-btn {
  font-size: 14px;
  transition: all 0.3s;
}
.header-btn:hover {
  background: rgba(0,191,255,0.2);
}

/* 1. HERO */
.hero {
  text-align: center;
}
.hero h1 {
  font-size: 52px;
  margin: 0 0 15px 0;
  letter-spacing: -1px;
  line-height: 1.1;
}
.hero p {
  font-size: 18px;
  color: var(--accent);
  max-width: 700px;
  margin: 0 auto 40px auto;
}
.btn-primary {
  background: var(--accent);
  color: #000;
  padding: 12px 24px;
  border-radius: 6px;
  text-decoration: none;
  font-weight: 600;
  font-size: 15px;
  display: inline-block;
  transition: all 0.3s ease;
}
.btn-primary:hover { 
  opacity: 1; 
  transform: translateY(-2px); 
  box-shadow: 0 0 20px rgba(0,191,255,0.5); 
}

/* HERO VISUAL */
.hero-visual {
  max-width: 900px;
  margin: 80px auto 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 40px;
  text-align: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}
.hv-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 30px;
  margin-bottom: 20px;
}
.hv-col {
  text-align: center;
}
.hv-label {
  font-size: 14px; color: var(--text-muted); margin-bottom: 10px; }
.hv-val {
  font-size: 32px; font-weight: 700; color: var(--text-primary); margin-bottom: 15px; }
.hv-val.highlight { color: var(--accent); }
.hv-track {
  width: 100%;
  height: 8px;
  background: #21262d;
  border-radius: 4px;
  overflow: hidden;
  position: relative;
  margin-bottom: 15px;
}
.hv-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 1s ease;
}
.hv-fill.base { background: #444c56; }
.hv-fill.sel { background: linear-gradient(90deg, #444c56, #0088b3); }
.hv-fill.re { background: var(--accent); box-shadow: 0 0 10px rgba(0,191,255,0.5); }
.hv-caption {
  font-size: 15px;
  color: var(--text-primary);
  margin-top: 30px;
  border-top: 1px solid var(--border);
  padding-top: 20px;
}

/* 2. CORE SYSTEM VISUAL */
.system-wrap {
  display: flex;
  justify-content: space-between;
  align-items: stretch;
  gap: 20px;
  flex-wrap: wrap;
  width: 100%;
}
.sys-panel {
  flex: 1;
  min-width: 250px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 30px 20px;
  text-align: center;
  box-sizing: border-box;
}
.sys-title {
  font-size: 16px; font-weight: 600; margin-bottom: 20px; }
.sys-dot-box {
  width: 100%;
  height: 100px;
  background: #010409;
  border: 1px solid #21262d;
  border-radius: 8px;
  position: relative;
  overflow: hidden;
}
.dot { position: absolute; width: 6px; height: 6px; border-radius: 50%; }
.arrow-right {
  font-size: 24px; color: #444c56; font-weight: 700; }
.sys-caption {
  text-align: center; font-size: 15px; color: var(--text-primary); margin-top: 30px; }

/* 3. MODULE GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 30px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 30px;
  transition: all 0.3s ease;
  display: flex;
  flex-direction: column;
}
.card:hover {
  border-color: var(--accent);
  box-shadow: 0 10px 30px rgba(0,191,255,0.15);
  transform: translateY(-4px) scale(1.02);
}
.card h3 {
  font-size: 22px; color: var(--accent); }
.card p {
  font-size: 16px; margin: 0 0 25px; flex-grow: 1; }
.mini-vis {
  font-size: 15px;
  min-height: 80px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* 4. WHY IT WORKS */
.why-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 50px;
}
.cross-domain { display: flex; justify-content: center; gap: 40px; }
.cd-bar { width: 100px; text-align: center; }
.cd-track { height: 150px; background: #21262d; border-radius: 8px; margin: 15px auto; display: flex; align-items: flex-end; padding: 0; overflow:hidden;}
.cd-fill { width: 100%; border-radius: 4px; background: var(--accent); transition: height 1s ease; }
.why-caption { text-align: center; color: var(--text-primary); font-size: 15px; margin-top: 40px; }

/* 5. HOW IT WORKS */
.pipeline {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 40px;
}
.pipe-box {
  font-size: 14px;
  font-weight: 500;
  text-align: center;
  flex: 1;
}
.pipe-arr {
  font-size: 18px;
  color: var(--accent);
  padding: 0 15px;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0% { opacity:0.5; } 50% { opacity:1; } 100% { opacity:0.5; } }

/* 6. CTA FINAL */
.cta-final {
  text-align: center;
  padding: 100px 0;
  background: linear-gradient(180deg, transparent, rgba(0,191,255,0.03));
  border-radius: 20px;
}
.cta-final h2 { margin-bottom: 30px; }

/* 7. FOOTER */
footer {
  display: flex;
  justify-content: space-between;
  padding: 20px 30px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-muted);
  font-size: 14px;
  margin-top: 40px;
}

/* MICRO-ANIMATIONS */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.hero h1 { opacity: 0; animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 0.1s forwards; }
.hero p { opacity: 0; animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 0.3s forwards; }
.hero > .btn-primary { opacity: 0; animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 0.5s forwards; }
.hero-visual { opacity: 0; animation: fadeInUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) 0.7s forwards; }

@keyframes fillTrack { from { width: 0; } }
.hv-fill { animation: fillTrack 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) 1s backwards; }

@keyframes growUp { from { height: 0; } }
.cd-fill { animation: growUp 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) 0.5s backwards; }

.dossier-link:hover { color: var(--accent) !important; border-color: var(--accent) !important; }
</style>
</head>
<body>

<canvas id="bg"></canvas>




<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

let mouseX = -1000;
let mouseY = -1000;
window.addEventListener("mousemove", (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});
window.addEventListener("mouseout", () => {
  mouseX = -1000;
  mouseY = -1000;
});

let particles = Array.from({length: 80}, () => ({
  x: Math.random()*canvas.width,
  y: Math.random()*canvas.height,
  baseX: Math.random()*canvas.width,
  baseY: Math.random()*canvas.height,
  dx: (Math.random()-0.5)*0.5,
  dy: (Math.random()-0.5)*0.5,
  color: Math.random() > 0.3 ? "rgba(0,191,255,0.7)" : "rgba(255,140,0,0.7)"  
}));

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  
  // Draw lines
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      let dx = particles[i].x - particles[j].x;
      let dy = particles[i].y - particles[j].y;
      let dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 120) {
        ctx.beginPath();
        ctx.strokeStyle = `rgba(0,191,255,${0.2 * (1 - dist/120)})`;
        ctx.lineWidth = 1;
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }

  // Draw dots and handle mouse interaction
  particles.forEach(p => {
    p.x += p.dx; p.y += p.dy;
    if(p.x < 0 || p.x > canvas.width) p.dx *= -1;
    if(p.y < 0 || p.y > canvas.height) p.dy *= -1;
    
    // Mouse repel
    let distX = mouseX - p.x;
    let distY = mouseY - p.y;
    let distToMouse = Math.sqrt(distX*distX + distY*distY);
    if(distToMouse < 150) {
       p.x -= (distX/distToMouse) * 2;
       p.y -= (distY/distToMouse) * 2;
    }
    
    ctx.shadowBlur = p.color.includes("191,255") ? 15 : 10;
    ctx.shadowColor = p.color;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
