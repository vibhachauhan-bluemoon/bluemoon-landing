<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BlueMoonBio Signal Animation - Disease vs Biology</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0c0f12;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .text-layer {
            display: none;
        }

        .overlay-text {
            position: absolute;
            color: #ffffff;
            font-weight: 600;
            font-size: 3.2rem;
            letter-spacing: -0.01em;
            opacity: 0;
            text-align: center;
            transition: opacity 0.2s ease;
        }

        #t2 {
            transform: translateY(200px);
            color: #bbbbbb;
            font-weight: 400;
            font-size: 2.2rem;
        }

        #t3 {
            transform: translateY(260px);
            color: #00b4ff;
            font-weight: 400;
            font-size: 2.8rem;
        }

        #logo-container {
            display: none;
        }

        .axis-label {
            position: absolute;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 400;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 2;
        }
        #axis-x {
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
        }
        #axis-y {
            left: 60px;
            top: 50%;
            transform: translateY(-50%) rotate(-90deg);
        }
    </style>
</head>
<body>

    <div id="axis-x" class="axis-label">BIOLOGICAL AXIS 1</div>
    <div id="axis-y" class="axis-label">BIOLOGICAL AXIS 2</div>

    <canvas id="canvas"></canvas>

    <div class="text-layer">
        <div id="t1" class="overlay-text">We treat patients like this.</div>
        <div id="t2" class="overlay-text">Same biology.</div>
        <div id="t3" class="overlay-text">Same response.</div>
    </div>
    
    <div id="logo-container">— @bluemoonbio</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        const NUM_POINTS = 300;
        const points = [];

        const groups = [
            { id: 0, name: "Breast Cancer", color: "210, 80, 100",  cx: 0.25, cy: 0.25 },
            { id: 1, name: "Melanoma",      color: "220, 140, 50",  cx: 0.75, cy: 0.25 },
            { id: 2, name: "Crohn's",       color: "50, 160, 100",  cx: 0.25, cy: 0.75 },
            { id: 3, name: "RA",            color: "60, 130, 200",  cx: 0.75, cy: 0.75 }
        ];

        const bioClusters = [
            { id: 0, cx: 0.5,  cy: 0.4,  radius: 0.12 },
            { id: 1, cx: 0.2,  cy: 0.6,  radius: 0.08 },
            { id: 2, cx: 0.8,  cy: 0.8,  radius: 0.08 },
            { id: 3, cx: 0.65, cy: 0.2,  radius: 0.06 }
        ];

        for (let i = 0; i < NUM_POINTS; i++) {
            let group = groups[i % 4];
            
            let bioChoice = Math.random();
            let bioCluster;
            if (bioChoice < 0.5) bioCluster = bioClusters[0]; 
            else if (bioChoice < 0.75) bioCluster = bioClusters[1];
            else if (bioChoice < 0.9) bioCluster = bioClusters[2];
            else bioCluster = bioClusters[3];

            let sx = group.cx * width + (Math.random() - 0.5) * 120;
            let sy = group.cy * height + (Math.random() - 0.5) * 120;

            let angle = Math.random() * Math.PI * 2;
            let r = Math.sqrt(Math.random()) * (bioCluster.radius * height);
            let tx = bioCluster.cx * width + Math.cos(angle) * r;
            let ty = bioCluster.cy * height + Math.sin(angle) * r;

            let isResponder = Math.random() < (bioCluster.id === 0 ? 0.85 : 0.1);

            points.push({
                groupId: group.id,
                color: group.color,
                startX: sx,
                startY: sy,
                targetX: tx,
                targetY: ty,
                bioClusterId: bioCluster.id,
                currentX: sx,
                currentY: sy,
                isResponder: isResponder
            });
        }

        let startTime = null;

        function animate(timestamp) {
            if (!startTime) startTime = timestamp;
            const elapsed = timestamp - startTime;

            ctx.clearRect(0, 0, width, height);

            // GRID
            ctx.strokeStyle = "rgba(255, 255, 255, 0.03)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            for(let x=0; x<width; x+=50) { ctx.moveTo(x, 0); ctx.lineTo(x, height); }
            for(let y=0; y<height; y+=50) { ctx.moveTo(0, y); ctx.lineTo(width, y); }
            ctx.stroke();

            if (elapsed > 1000 && elapsed < 3500) {
                document.getElementById('t1').style.opacity = 1;
            } else {
                document.getElementById('t1').style.opacity = 0;
            }

            let migrationProgress = 0;
            if (elapsed > 4500 && elapsed <= 7500) {
                let t = (elapsed - 4500) / 3000;
                migrationProgress = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; 
                document.getElementById('axis-x').style.opacity = 1;
                document.getElementById('axis-y').style.opacity = 1;
            } else if (elapsed > 7500) {
                migrationProgress = 1;
                document.getElementById('axis-x').style.opacity = 1;
                document.getElementById('axis-y').style.opacity = 1;
            }

            let highlightProgress = 0;
            if (elapsed > 9500 && elapsed <= 10500) {
                highlightProgress = (elapsed - 9500) / 1000;
            } else if (elapsed > 10500) {
                highlightProgress = 1;
            }

            let responseProgress = 0;
            if (elapsed > 11500 && elapsed <= 12500) {
                responseProgress = (elapsed - 11500) / 1000;
            } else if (elapsed > 12500) {
                responseProgress = 1;
            }

            if (elapsed > 14500) {
                document.getElementById('t2').style.opacity = 1;
            }
            if (elapsed > 16000) {
                document.getElementById('t3').style.opacity = 1;
            }
            if (elapsed > 17000) {
                document.getElementById('logo-container').style.opacity = 1;
            }

            if (elapsed > 13500) {
                let dimT = Math.min(1, (elapsed - 13500) / 1000);
                ctx.fillStyle = `rgba(12, 15, 18, ${dimT * 0.65})`;
                ctx.fillRect(0, 0, width, height);
            }

            // Clinical Boundaries (Initial)
            let clinicalAlpha = 1 - (elapsed > 3500 ? Math.min(1, (elapsed - 3500)/1000) : 0);
            if (clinicalAlpha > 0) {
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 5]);
                groups.forEach(g => {
                    ctx.strokeStyle = `rgba(${g.color}, ${clinicalAlpha * 0.5})`;
                    ctx.beginPath();
                    ctx.arc(g.cx * width, g.cy * height, 100, 0, Math.PI*2);
                    ctx.stroke();

                    ctx.fillStyle = `rgba(${g.color}, ${clinicalAlpha * 0.8})`;
                    ctx.font = "400 14px Inter, sans-serif";
                    ctx.textAlign = "center";
                    ctx.fillText(g.name, g.cx * width, g.cy * height - 115);
                    
                    ctx.fillStyle = `rgba(255, 255, 255, ${clinicalAlpha * 0.4})`;
                    ctx.font = "300 11px Inter, sans-serif";
                    ctx.fillText(`n=75`, g.cx * width, g.cy * height - 95);
                });
                ctx.setLineDash([]);
            }

            // Target Biological Boundary
            if (highlightProgress > 0) {
                let bc = bioClusters[0];
                ctx.lineWidth = 2;
                ctx.strokeStyle = `rgba(255, 255, 255, ${highlightProgress * 0.4})`;
                ctx.beginPath();
                ctx.arc(bc.cx * width, bc.cy * height, bc.radius * height + 15, 0, Math.PI*2);
                ctx.stroke();

                ctx.fillStyle = `rgba(255, 255, 255, ${highlightProgress})`;
                ctx.font = "600 12px Inter, sans-serif";
                ctx.textAlign = "left";
                
                let labelX = bc.cx * width + bc.radius * height + 30;
                let labelY = bc.cy * height;
                
                ctx.beginPath();
                ctx.moveTo(bc.cx * width + bc.radius * height + 15, bc.cy * height);
                ctx.lineTo(labelX - 5, labelY);
                ctx.strokeStyle = `rgba(255, 255, 255, ${highlightProgress * 0.3})`;
                ctx.stroke();

                ctx.fillText("CROSS-DISEASE COHORT", labelX, labelY - 14);
                
                ctx.fillStyle = `rgba(255, 255, 255, ${highlightProgress * 0.7})`;
                ctx.font = "400 10px Inter, sans-serif";
                ctx.fillText("n=150 (Mixed Diagnoses)", labelX, labelY + 2);

                ctx.fillStyle = `rgba(255, 255, 255, ${highlightProgress * 0.5})`;
                ctx.font = "400 10px Inter, sans-serif";
                ctx.fillText("4 diseases → 1 cohort", labelX, labelY + 18);

                // Application overlay
                if (responseProgress > 0) {
                    ctx.fillStyle = `rgba(0, 180, 255, ${responseProgress})`;
                    ctx.font = "600 10px Inter, sans-serif";
                    ctx.fillText("85% Responders", labelX, labelY + 36);
                }
            }

            // Ghosted Clinical Boundaries (Counterfactual)
            let ghostAlpha = 0;
            if (elapsed > 13000) {
                ghostAlpha = Math.min(1, (elapsed - 13000) / 1500) * 0.2; 
                ctx.lineWidth = 1;
                ctx.setLineDash([2, 4]);
                groups.forEach(g => {
                    ctx.strokeStyle = `rgba(${g.color}, ${ghostAlpha})`;
                    ctx.beginPath();
                    ctx.arc(g.cx * width, g.cy * height, 100, 0, Math.PI*2);
                    ctx.stroke();
                    
                    ctx.fillStyle = `rgba(${g.color}, ${ghostAlpha * 1.5})`;
                    ctx.font = "400 14px Inter, sans-serif";
                    ctx.textAlign = "center";
                    ctx.fillText(g.name, g.cx * width, g.cy * height - 115);
                });
                ctx.setLineDash([]);
            }

            // Draw points
            points.forEach(p => {
                p.currentX = p.startX + (p.targetX - p.startX) * migrationProgress;
                p.currentY = p.startY + (p.targetY - p.startY) * migrationProgress;

                if (migrationProgress > 0 && migrationProgress < 1) {
                    p.currentX += Math.sin(elapsed * 0.002 + p.targetX) * 0.5;
                    p.currentY += Math.cos(elapsed * 0.002 + p.targetY) * 0.5;
                }

                let alpha = 0.8;
                let glow = 0;
                let [r, g, b] = p.color.split(',').map(Number);

                if (highlightProgress > 0) {
                    if (p.bioClusterId === 0) {
                        alpha = 0.9;
                        glow = 10 * highlightProgress;
                        
                        let boost = 40 * highlightProgress;
                        r = Math.min(255, r + boost);
                        g = Math.min(255, g + boost);
                        b = Math.min(255, b + boost);
                    } else {
                        alpha = 0.8 * (1 - 0.8 * highlightProgress); 
                    }
                }

                // If ghosted boundaries are drawn, slightly fade the points to bring text to foreground
                if (elapsed > 12000) {
                    alpha = alpha * 0.6;
                }

                ctx.beginPath();
                ctx.arc(p.currentX, p.currentY, 3.5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;

                if (glow > 0) {
                    ctx.shadowBlur = glow;
                    ctx.shadowColor = `rgba(${r}, ${g}, ${b}, ${highlightProgress * 0.6})`;
                } else {
                    ctx.shadowBlur = 0;
                }
                
                ctx.fill();

                // Application/Responder Overlay inside the cluster
                if (responseProgress > 0 && p.isResponder && p.bioClusterId === 0) {
                    ctx.shadowBlur = 0;
                    ctx.beginPath();
                    ctx.arc(p.currentX, p.currentY, 5 + (2 * responseProgress), 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(255, 255, 255, ${responseProgress * 0.8})`;
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }
            });
            ctx.shadowBlur = 0;

            if (elapsed >= 20000) {
                startTime = null;
            }
            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);

    </script>
</body>
</html>
