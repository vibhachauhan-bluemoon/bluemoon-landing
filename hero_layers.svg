<svg width="640" height="480" viewBox="0 0 640 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="layer1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a1a1aa"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#80fbff"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a371f7"/>
      <stop offset="100%" stop-color="#c6a6fb"/>
    </linearGradient>
    <linearGradient id="layer4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#fcb1b1"/>
    </linearGradient>
  </defs>
  <rect width="640" height="480" fill="#050505"/>
  <!-- Soft background circle -->
  <circle cx="320" cy="220" r="180" fill="#0A0B10"/>
  <!-- Stacked rounded rectangles -->
  <rect x="150" y="130" width="340" height="200" rx="28" fill="url(#layer1)" opacity="0.15"/>
  <rect x="170" y="150" width="340" height="200" rx="26" fill="url(#layer2)" opacity="0.25"/>
  <rect x="190" y="170" width="340" height="200" rx="24" fill="url(#layer3)" opacity="0.3"/>
  <rect x="210" y="190" width="340" height="200" rx="22" fill="url(#layer4)" opacity="0.35"/>
  <!-- Genetics icon (top left) -->
  <g transform="translate(190,150)">
    <path d="M20 10 C40 30 10 50 30 70" stroke="#ffffff" stroke-width="3" fill="none"/>
    <path d="M30 10 C10 30 40 50 20 70" stroke="#ffffff" stroke-width="3" fill="none"/>
    <circle cx="25" cy="20" r="3" fill="#ffffff"/>
    <circle cx="25" cy="60" r="3" fill="#ffffff"/>
  </g>
  <!-- Immune dots (top right) -->
  <g transform="translate(420,150)">
    <circle cx="20" cy="20" r="12" fill="none" stroke="#ffffff" stroke-width="2"/>
    <circle cx="20" cy="20" r="3" fill="#ffffff"/>
    <circle cx="40" cy="20" r="3" fill="#ffffff"/>
    <circle cx="10" cy="35" r="3" fill="#ffffff"/>
    <circle cx="32" cy="38" r="3" fill="#ffffff"/>
  </g>
  <!-- Hormone wave (bottom left) -->
  <g transform="translate(190,260)">
    <path d="M0 25 C20 5 40 45 60 25 C80 5 100 45 120 25" stroke="#ffffff" stroke-width="3" fill="none"/>
  </g>
  <!-- Neural circuit (bottom right) -->
  <g transform="translate(380,250)">
    <circle cx="20" cy="20" r="4" fill="#ffffff"/>
    <circle cx="60" cy="20" r="4" fill="#ffffff"/>
    <circle cx="40" cy="45" r="4" fill="#ffffff"/>
    <line x1="20" y1="20" x2="60" y2="20" stroke="#ffffff" stroke-width="2"/>
    <line x1="20" y1="20" x2="40" y2="45" stroke="#ffffff" stroke-width="2"/>
    <line x1="60" y1="20" x2="40" y2="45" stroke="#ffffff" stroke-width="2"/>
  </g>
</svg>
